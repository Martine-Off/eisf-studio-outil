version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: studio_eisf_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: martine
      POSTGRES_DB: studio_eisf
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
